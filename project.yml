name: HelloSynth
options:
  bundleIdPrefix: com.hellosynth
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
targets:
  HelloSynth:
    type: application
    platform: iOS
    sources:
      - path: HelloSynth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hellosynth.app
        INFOPLIST_KEY_CFBundleDisplayName: Hello Synth
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: HelloSynthAU
        embed: true

  HelloSynthMac:
    type: application
    platform: macOS
    sources:
      - path: HelloSynth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hellosynth.app.mac
        INFOPLIST_KEY_CFBundleDisplayName: Hello Synth
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: HelloSynthAUMac
        embed: true

  HelloSynthAU:
    type: app-extension
    platform: iOS
    sources:
      - path: HelloSynthAU
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hellosynth.app.HelloSynthAU
        INFOPLIST_FILE: HelloSynthAU/Info.plist
        CODE_SIGN_ENTITLEMENTS: HelloSynthAU/HelloSynthAU.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        OTHER_LDFLAGS: "-ObjC"
    info:
      path: HelloSynthAU/Info.plist
      properties:
        CFBundleDisplayName: Hello Synth
        NSExtension:
          NSExtensionAttributes:
            AudioComponents:
              - description: Hello Synth
                factoryFunction: "$(PRODUCT_MODULE_NAME).HelloSynthAUFactory"
                manufacturer: HlSy
                name: "Hello Synth: Hello Synth"
                subtype: HlSy
                type: aumu
                version: 1
          NSExtensionPointIdentifier: com.apple.AudioUnit
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).AudioUnitViewController"

  HelloSynthAUMac:
    type: app-extension
    platform: macOS
    sources:
      - path: HelloSynthAU
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hellosynth.app.mac.HelloSynthAU
        INFOPLIST_FILE: HelloSynthAU/Info.plist
        CODE_SIGN_ENTITLEMENTS: HelloSynthAU/HelloSynthAU-macOS.entitlements
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES
        OTHER_LDFLAGS: "-ObjC"
    info:
      path: HelloSynthAU/Info.plist
      properties:
        CFBundleDisplayName: Hello Synth
        NSExtension:
          NSExtensionAttributes:
            AudioComponents:
              - description: Hello Synth
                factoryFunction: "$(PRODUCT_MODULE_NAME).HelloSynthAUFactory"
                manufacturer: HlSy
                name: "Hello Synth: Hello Synth"
                subtype: HlSy
                type: aumu
                version: 1
          NSExtensionPointIdentifier: com.apple.AudioUnit
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).AudioUnitViewController"

schemes:
  HelloSynth:
    build:
      targets:
        HelloSynth: all
        HelloSynthAU: all
    run:
      config: Debug
      askForAppToLaunch: true

  HelloSynthMac:
    build:
      targets:
        HelloSynthMac: all
        HelloSynthAUMac: all
    run:
      config: Debug
      askForAppToLaunch: true
